name: CI/CD Pipeline with OWASP ZAP

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build application
        run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Run tests
        run: npm test

  zap_scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Start OWASP ZAP scan
        uses: zaproxy/action-full-scan@v0.8.0
        with:
          target: 'https://jefdevsecops.netlify.app/'  # Update this with your Netlify app URL
          fail_action: true  # Stops the build if vulnerabilities are found
          rules_file_name: '.zap/rules.js'  # Optional: Customize ZAP rules if needed
      
      - name: Upload ZAP scan report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: zap-report
          path: zap/**  # Adjust path if necessary

  deploy:
    runs-on: ubuntu-latest
    needs: zap_scan  # Only runs if zap_scan job is successful
    steps:
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx netlify-cli deploy --site $NETLIFY_SITE_ID --auth $NETLIFY_AUTH_TOKEN --prod
