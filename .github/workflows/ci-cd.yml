name: CI/CD Pipeline with OWASP ZAP Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: ./TodoApp
        run: npm install
      
      - name: Build application
        working-directory: ./TodoApp
        run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Run tests
        working-directory: ./TodoApp
        run: npm test

  zap_scan:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Start OWASP ZAP scan
        uses: zaproxy/action-full-scan@v0.8.0
        with:
          target: 'https://jefdevsecops.netlify.app/'  # Update this with your Netlify app URL
          fail_action: false  # Allows non-critical warnings to pass
          rules_file_name: '.zap/rules.js'  # Customize ZAP rules if needed
          output: 'zap/zap_report.html'  # Specify where to save the report
        continue-on-error: true  # Continue if there are warnings or non-critical errors
      
      - name: Create zap directory
        run: mkdir -p zap

      - name: Upload ZAP scan report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: zap-report
          path: zap/zap_report.html  # Adjust this path to match the output location

      - name: Check for vulnerabilities
        run: |
          if grep -q "FAIL" zap/zap_report.html; then
            echo "Vulnerabilities detected! Failing the job."
            exit 1
          else
            echo "No critical vulnerabilities found."
          fi

  deploy:
    needs: zap_scan
    runs-on: ubuntu-latest
    if: success()  # Only run if OWASP ZAP did not flag critical issues
    steps:
      - name: Check environment variables
        run: |
          echo "NETLIFY_SITE_ID: $NETLIFY_SITE_ID"
          echo "NETLIFY_AUTH_TOKEN: $NETLIFY_AUTH_TOKEN"

      - name: Install Netlify CLI
        run: npm install -g netlify-cli
      
      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=./TodoApp --site=${{ secrets.NETLIFY_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}
