name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3  # Updated to v3

    - name: Set up Node.js
      uses: actions/setup-node@v3  # Update to a more recent version if available
      with:
        node-version: '18'  # Make sure this is still compatible

    - name: Install dependencies
      working-directory: TodoApp
      run: npm install

    - name: Build and Deploy
      working-directory: TodoApp
      run: |
        npx netlify-cli deploy --site ${{ secrets.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }} --prod --dir=.
