name: CI/CD Pipeline with OWASP ZAP Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: ./TodoApp
        run: npm install
      
      - name: Build application
        working-directory: ./TodoApp
        run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Run tests
        working-directory: ./TodoApp
        run: npm test

  zap_scan:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Start OWASP ZAP scan
        uses: zaproxy/action-full-scan@v0.8.0
        with:
          target: 'https://jefdevsecops.netlify.app/'  # Update this with your Netlify app URL
          fail_action: false  # Allows non-critical warnings to pass
          rules_file_name: '.zap/rules.js'  # Customize ZAP rules if needed
        continue-on-error: true  # Continue if there are warnings or non-critical errors
      
      - name: Upload ZAP scan report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: zap-report
          path: zap/**  # Adjust path if necessary

      - name: Check for vulnerabilities
        if: ${{ steps.zap.outputs.fail }}
        run: |
          echo "Vulnerabilities detected! Failing the job."
          exit 1

  deploy:
    needs: zap_scan
    runs-on: ubuntu-latest
    if: success() # Only run if OWASP ZAP did not flag critical issues
    steps:
      - name: Install Netlify CLI
        run: npm install -g netlify-cli
      
      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=./TodoApp --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
