name: CI/CD Pipeline with OWASP ZAP Scan

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./TodoApp
        run: npm install

      - name: Build the app
        working-directory: ./TodoApp
        run: npm run build

      - name: Run tests
        working-directory: ./TodoApp
        run: npm test

  owasp_zap:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Run OWASP ZAP in Docker
        run: |
          docker run -d -p 8080:8080 --name owasp-zap owasp/zap2docker-stable zap.sh -daemon -port 8080 -host 0.0.0.0 -config api.disablekey=true
          
      - name: Wait for OWASP ZAP to initialize
        run: sleep 30  # Wait time for ZAP to start up

      - name: OWASP ZAP Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'https://jefdevsecops.netlify.app/'  # Update to your actual app URL if different
        continue-on-error: true

      - name: Check for vulnerabilities
        if: ${{ steps.zap.outputs.fail }}  # OWASP ZAP scan has flagged vulnerabilities
        run: |
          echo "Vulnerabilities detected! Failing the job."
          exit 1

  deploy:
    needs: owasp_zap
    runs-on: ubuntu-latest
    if: success()  # Only run if OWASP ZAP did not flag issues
    steps:
      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=./TodoApp --site=${{ secrets.NETLIFY_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}
